<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 
  <div class="container">
    <div class="card">
 
      <div class="card-header">
        <div class="circle"></div>
        <h1 class="title">Registration Form</h1>
      </div>
 
      <!-- Full Name -->
      <div class="field">
        <label class="label">Full Name</label>
        <input type="text" class="input" placeholder="Enter your name" />
      </div>
 
      <!-- Email -->
      <div class="field">
        <label class="label">Email address</label>
        <input type="email" class="input" placeholder="Enter email address" />
      </div>
 
      <!-- Phone + Birth Date -->
      <div class="field-row">
        <div class="field">
          <label class="label">Phone Number</label>
          <input type="tel" class="input" placeholder="Enter phone number" />
        </div>
        <div class="field">
          <label class="label">Birth Date</label>
          <input type="date" class="input" />
        </div>
      </div>
 
      <!-- Gender -->
      <div class="field">
        <label class="label">Gender</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="gender" value="male" checked /> Male
          </label>
          <label class="radio-label">
            <input type="radio" name="gender" value="female" /> Female
          </label>
          <label class="radio-label">
            <input type="radio" name="gender" value="prefer-not" /> Prefer not to say
          </label>
        </div>
      </div>
 
      <!-- Address -->
      <div class="field">
        <label class="label">Address</label>
        <input type="text" class="input" placeholder="Enter street address" />
        <input type="text" class="input mt" placeholder="Enter street address line 2" />
      </div>
 
      <!-- Country + City -->
      <div class="field-row">
        <div class="field">
          <select class="input select">
            <option value="" disabled selected>Select country</option>
            <option>Brazil</option>
            <option>United States</option>
            <option>Portugal</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <input type="text" class="input" placeholder="Enter your city" />
        </div>
      </div>
 
      <!-- Submit -->
      <button class="btn-submit">Register</button>
 
    </div>
  </div>
 
</body>
</html>
